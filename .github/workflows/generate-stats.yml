name: 📊 Generate Profile Assets

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4

      # 1. Generate Trophies (Self-Hosted via ryo-ma)
      - name: 🏆 Generate Trophies
        uses: ryo-ma/github-profile-trophy@master
        with:
          username: Abeera-Mehtab
          theme: dark_lover
          filename: profile-trophy.svg
          row: 1
          column: 4
          no-frame: true

      # 2. Generate Stats & Languages (Self-Hosted via vn7n24fzkq)
      # This tool hits the GitHub API directly, so it works even if Vercel is down.
      - name: 📈 Generate Stats & Languages
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }} # Ensure your PAT has 'repo' scope
        with:
          USERNAME: Abeera-Mehtab
          # Note: If 'dark_lover' is not supported by this tool, it falls back to default.
          # You can change THEME to 'monokai' or 'solarized' if needed.
          THEME: dark_lover 
