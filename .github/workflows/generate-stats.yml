name: 📊 Resilient Profile Assets

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4

      # 1. Stats & Languages (Most reliable self-hosted option)
      - name: 📈 Generate Stats & Languages
        id: summary
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: Abeera-Mehtab
          THEME: dark_lover
        continue-on-error: true

      # 2. Trophies (With auth + graceful fallback)
      - name: 🏆 Generate Trophies
        id: trophies
        uses: ryo-ma/github-profile-trophy@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          username: Abeera-Mehtab
          theme: dark_lover
          filename: profile-trophy.svg
          row: 1
          column: 4
          no-frame: true
        continue-on-error: true

      # 3. Streak (Direct download with fallback)
      - name: 🔥 Download Streak
        id: streak
        run: |
          if curl -sf -o streak-stats.svg "https://streak-stats.demolab.com/?user=Abeera-Mehtab&theme=dark_lover&border_radius=7"; then
            echo "✅ Streak downloaded"
          else
            echo "⚠️ Streak service unavailable, creating placeholder"
            cat > streak-stats.svg << 'EOF'
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="160" viewBox="0 0 400 160">
  <rect width="400" height="160" fill="#161b22" rx="7"/>
  <text x="50%" y="50%" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="14">Streak stats loading...</text>
</svg>
EOF
          fi

      # 4. Create fallbacks for any missing files
      - name: 🛡️ Ensure All Files Exist
        run: |
          # Fallback for Stats
          if [ ! -f "./profile-summary-card-output/Abeera-Mehtab/3-stats.svg" ]; then
            echo "⚠️ Stats not generated, creating placeholder"
            mkdir -p ./profile-summary-card-output/Abeera-Mehtab
            cat > ./profile-summary-card-output/Abeera-Mehtab/3-stats.svg << 'EOF'
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="160" viewBox="0 0 400 160">
  <rect width="400" height="160" fill="#161b22" rx="7"/>
  <text x="50%" y="50%" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="14">GitHub stats loading...</text>
</svg>
EOF
          fi
          
          # Fallback for Languages
          if [ ! -f "./profile-summary-card-output/Abeera-Mehtab/2-most-commit-language.svg" ]; then
            echo "⚠️ Languages not generated, creating placeholder"
            cat > ./profile-summary-card-output/Abeera-Mehtab/2-most-commit-language.svg << 'EOF'
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="160" viewBox="0 0 400 160">
  <rect width="400" height="160" fill="#161b22" rx="7"/>
  <text x="50%" y="50%" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="14">Top languages loading...</text>
</svg>
EOF
          fi
          
          # Fallback for Trophies
          if [ ! -f "profile-trophy.svg" ]; then
            echo "⚠️ Trophies not generated, creating placeholder"
            cat > profile-trophy.svg << 'EOF'
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#161b22" rx="7"/>
  <text x="50%" y="50%" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="14">Trophies loading...</text>
</svg>
EOF
          fi

      # 5. Copy to exact filenames your README expects
      - name: 📦 Sync Filenames
        run: |
          cp -f ./profile-summary-card-output/Abeera-Mehtab/3-stats.svg ./github-stats.svg
          cp -f ./profile-summary-card-output/Abeera-Mehtab/2-most-commit-language.svg ./languages.svg
          # streak-stats.svg and profile-trophy.svg already in root

      # 6. Safe commit (only if files changed)
      - name: 💾 Commit Assets
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          git pull --rebase origin main 2>/dev/null || true
          
          git add github-stats.svg languages.svg streak-stats.svg profile-trophy.svg 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
            exit 0
          fi
          
          git commit -m "📊 Update profile assets [skip ci]"
          git push
