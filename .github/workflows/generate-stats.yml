name: 📊 Generate Profile Assets

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight
  workflow_dispatch: # Allows manual run

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4

      # 1. Generate Stats & Languages (Profile Summary Cards)
      # This replaces the broken anuraghazra repo. It generates 4-5 SVGs in a folder.
      - name: 📈 Generate Stats & Languages
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        with:
          USERNAME: Abeera-Mehtab

      # 2. Generate Trophies
      - name: 🏆 Generate Trophies
        uses: ryo-ma/github-profile-trophy@master
        with:
          username: Abeera-Mehtab
          theme: dark_lover
          filename: profile-trophy.svg
          row: 1
          column: 4
          no-frame: true

      # 3. Generate Streak
      - name: 🔥 Generate Streak
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          user: Abeera-Mehtab
          theme: dark_lover
          output_path: ./streak-stats.svg
          push: false # We push manually at the end to combine all files

      # 4. Commit All Generated SVGs
      - name: 💾 Commit & Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "📊 Update profile assets [skip ci]" || echo "No changes"
          git push
