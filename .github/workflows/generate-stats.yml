name: 📊 Generate Profile Assets

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 🔑 Grants push permission
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4

      - name: 📈 Generate Stats & Languages
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: Abeera-Mehtab
          # The action auto-commits & pushes to this repo when GITHUB_TOKEN is set
